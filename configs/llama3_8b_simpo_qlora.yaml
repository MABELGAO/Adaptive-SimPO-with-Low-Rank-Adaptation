model:
  model_name_or_path: meta-llama/Meta-Llama-3-8B-Instruct
  trust_remote_code: false
  use_flash_attention_2: false
  bnb_4bit_quant_type: nf4
  bnb_4bit_use_double_quant: false
  bnb_4bit_compute_dtype: bfloat16

data:
  use_hub_dataset: true
  hub_dataset_name: argilla/dpo-mix-7k
  hub_train_split: train
  test_size: 0.1

lora:
  r: 16
  lora_alpha: 32
  lora_dropout: 0.05
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
    - gate_proj
    - up_proj
    - down_proj
  bias: none
  task_type: CAUSAL_LM

train:
  output_dir: ./llama-3-8b-instruct-simpo-final
  num_train_epochs: 1
  per_device_train_batch_size: 2
  per_device_eval_batch_size: 2
  gradient_accumulation_steps: 64
  learning_rate: 8.0e-7
  lr_scheduler_type: cosine
  warmup_ratio: 0.1
  optim: adamw_torch
  logging_steps: 1
  eval_steps: 50
  eval_strategy: steps
  bf16: true
  max_length: 2048
  max_prompt_length: 1024
  report_to: none

simpo:
  beta: 2.0
  simpo_gamma: 1.4
  cpo_alpha: 0.0
